    <rect x="132" y="128" width="196" height="268" rx="14" fill="#efe0c6"/>
    <rect x="132" y="128" width="26" height="268" rx="13" fill="#d8b98f"/>
  </g>

  <!-- vorderes Heft -->
  <g transform="rotate(7 256 272)">
    <rect x="176" y="112" width="204" height="278" rx="16" fill="url(#page)"/>
    <rect x="176" y="112" width="28" height="278" rx="14" fill="#e0452f"/>
    <!-- Sprechblase -->
    <path d="M232 168 h116 a20 20 0 0 1 20 20 v66 a20 20 0 0 1 -20 20 h-52
             l-30 30 v-30 h-34 a20 20 0 0 1 -20 -20 v-66 a20 20 0 0 1 20 -20 z"
          fill="#3a2c5e"/>
    <circle cx="262" cy="221" r="9" fill="#fffaf0"/>
    <circle cx="292" cy="221" r="9" fill="#fffaf0"/>
    <circle cx="322" cy="221" r="9" fill="#fffaf0"/>
    <!-- Textzeilen -->
    <rect x="216" y="312" width="128" height="12" rx="6" fill="#c9b48f"/>
    <rect x="216" y="340" width="88" height="12" rx="6" fill="#c9b48f"/>
